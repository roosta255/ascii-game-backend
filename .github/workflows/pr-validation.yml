name: Validate AI Pull Requests

on:
  pull_request:
    branches: [gamma]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache libjsoncpp-dev uuid-dev openssl libssl-dev zlib1g-dev libsqlite3-dev libboost-all-dev libbrotli-dev libcurl4-openssl-dev pkg-config nlohmann-json3-dev

      - name: Build and Run Catch2 Tests
        run: |
          cmake -B build_ninja -G Ninja -DCMAKE_BUILD_TYPE=Debug
          cmake --build build_ninja -j$(nproc) --target test_target
          ./build_ninja/test_target # <--- THIS is what breaks the build on logic errors